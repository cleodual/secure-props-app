name: Build & Release Installers

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0). Only used for manual workflow dispatch.'
        required: false
        default: '1.0.0'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build Shadow JAR
        run: ./gradlew shadowJar

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg-dev rpm

      - name: Build Installers
        shell: bash
        run: |
          mkdir -p dist
          
          # Determine package type based on OS
          if [ "$RUNNER_OS" = "Linux" ]; then 
            TYPE="deb"
          elif [ "$RUNNER_OS" = "Windows" ]; then 
            TYPE="exe"
          else 
            TYPE="dmg"
          fi

          echo "Building $TYPE installer..."
          echo "RUNNER_OS: $RUNNER_OS"
          echo "Java version:"
          java -version
          echo ""
          echo "jpackage location:"
          which jpackage || echo "jpackage not found in PATH"
          echo ""
          echo "Contents of build/libs:"
          ls -lah build/libs/
          echo ""
          
          # Extract version - use input if workflow_dispatch, tag if push, otherwise default to 1.0.0
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "Using version from workflow input: $VERSION"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            # Validate version format (must be digits and dots)
            if ! [[ "$VERSION" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
              echo "Version '$VERSION' is not in valid format, using default 1.0.0"
              VERSION="1.0.0"
            fi
          fi
          
          # Build jpackage command with platform-specific options
          if [ "$TYPE" = "exe" ]; then
            jpackage \
              --input build/libs \
              --name SecureProps \
              --app-version "$VERSION" \
              --main-jar secureprops.jar \
              --main-class com.cleodual.mulesoft.Main \
              --type "$TYPE" \
              --dest dist \
              --icon icon/icon.ico \
              --win-menu \
              --win-menu-group "SecureProps" \
              --win-shortcut \
              --win-shortcut-prompt \
              --win-per-user-install \
              --win-dir-chooser || { echo "jpackage failed"; ls -la dist/; exit 1; }
          else
            ICON_EXT=$([ "$TYPE" = "dmg" ] && echo "icns" || echo "png")
            echo "Using icon: icon/icon.$ICON_EXT"
            jpackage \
              --input build/libs \
              --name SecureProps \
              --app-version "$VERSION" \
              --main-jar secureprops.jar \
              --main-class com.cleodual.mulesoft.Main \
              --type "$TYPE" \
              --dest dist \
              --icon icon/icon.$ICON_EXT \
              --verbose || { echo "jpackage failed"; ls -la dist/; exit 1; }
          fi

          echo ""
          echo "Contents of dist directory:"
          ls -lah dist/
          
          # Verify correct installer type was created
          if [ "$TYPE" = "exe" ]; then
            if ! find dist -name "*.exe" -type f > /dev/null; then
              echo "ERROR: No .exe file found!"
              exit 1
            fi
            echo "✅ EXE file created successfully"
          elif [ "$TYPE" = "deb" ]; then
            if ! find dist -name "*.deb" -type f > /dev/null; then
              echo "ERROR: No .deb file found!"
              exit 1
            fi
            echo "✅ DEB file created successfully"
          elif [ "$TYPE" = "dmg" ]; then
            if ! find dist -name "*.dmg" -type f > /dev/null; then
              echo "ERROR: No .dmg file found!"
              exit 1
            fi
            echo "✅ DMG file created successfully"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: dist/
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files

      - name: List downloaded files
        shell: bash
        run: |
          echo "=== Contents of release-files directory ==="
          find release-files -type f -exec ls -lh {} \;
          echo ""
          echo "=== Files to upload ==="
          find release-files -type f
          echo ""
          echo "=== Consolidating files to top level ==="
          find release-files -type f -name "*.exe" -o -name "*.deb" -o -name "*.dmg" | while read file; do
            cp "$file" release-files/
          done
          echo "Final release directory:"
          ls -lah release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            release-files/*.exe
            release-files/*.deb
            release-files/*.dmg
          generate_release_notes: true
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

