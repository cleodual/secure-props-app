name: Build & Release Installers

on:
  push:
    tags:
      - "v*"

# ✅ REQUIRED: fixes "Resource not accessible by integration"
permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      # -----------------------
      # CHECKOUT
      # -----------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------
      # JAVA SETUP
      # -----------------------
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      # -----------------------
      # GRADLE SETUP
      # -----------------------
      - name: Make Gradle executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build Shadow JAR
        run: ./gradlew shadowJar

      # -----------------------
      # LINUX FIX (CRITICAL)
      # -----------------------
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg-dev rpm

      # -----------------------
      # BUILD INSTALLERS
      # -----------------------

      - name: Build Linux installer
        if: runner.os == 'Linux'
        shell: bash
        run: |
          jpackage \
            --input build/libs \
            --name SecureProps \
            --main-jar secureprops.jar \
            --main-class com.cleodual.mulesoft.Main \
            --type deb \
            --dest build/jpackage \
            --linux-package-name secureprops

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          jpackage --input build/libs --name SecureProps
          --main-jar secureprops.jar
          --main-class com.cleodual.mulesoft.Main
          --type exe
          --dest build/jpackage

      - name: Build macOS installer
        if: runner.os == 'macOS'
        shell: bash
        run: |
          jpackage \
            --input build/libs \
            --name SecureProps \
            --main-jar secureprops.jar \
            --main-class com.cleodual.mulesoft.Main \
            --type dmg \
            --dest build/jpackage

      # -----------------------
      # RENAME OUTPUTS (FIXES "file not found")
      # -----------------------
      - name: Rename installers
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME}

          echo "Detected OS: $RUNNER_OS"

          if [ "$RUNNER_OS" = "Linux" ]; then
            FILE=$(ls build/jpackage/*.deb | head -n 1)
            mv "$FILE" "SecureProps-$VERSION.deb"

          elif [ "$RUNNER_OS" = "Windows" ]; then
            FILE=$(ls build/jpackage/*.exe | head -n 1)
            mv "$FILE" "SecureProps-$VERSION.exe"

          elif [ "$RUNNER_OS" = "macOS" ]; then
            FILE=$(ls build/jpackage/*.dmg | head -n 1)
            mv "$FILE" "SecureProps-$VERSION.dmg"
          fi

      # -----------------------
      # DEBUG (optional but useful)
      # -----------------------
      - name: List files
        shell: bash
        run: ls -R

      # -----------------------
      # UPLOAD TO GITHUB RELEASE
      # -----------------------
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SecureProps-*.exe
            SecureProps-*.dmg
            SecureProps-*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}