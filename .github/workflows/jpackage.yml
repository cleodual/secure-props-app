name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:


jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: [actions/checkout](https://github.com)@v4

      - name: Set up JDK 21
        uses: [actions/setup-java](https://github.com/actions/setup-java)@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # Windows requires WiX Toolset for MSI generation
      - name: Install WiX (Windows Only)
        if: matrix.os == 'windows-latest'
        run: |
          dotnet tool install --global wix
          echo "C:\Users\runneradmin\.dotnet\tools" >> $GITHUB_PATH

      - name: Build and Package
        run: ./gradlew jpackage -Pversion=${{ github.ref_name || '1.0.0' }}
        shell: bash

      - name: Upload Artifacts
        uses: [actions/upload-artifact](https://github.com)@v4
        with:
          name: ${{ matrix.os }}-installer
          path: build/jpackage/*
