name: Build & Release Installers

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build Shadow JAR
        run: ./gradlew shadowJar

      # ✅ Linux fix
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg-dev rpm

      # -----------------------
      # BUILD INSTALLERS
      # -----------------------

      - name: Build Linux installer
        if: runner.os == 'Linux'
        run: |
          jpackage \
            --input build/libs \
            --name SecureProps \
            --main-jar secureprops.jar \
            --main-class com.cleodual.mulesoft.Main \
            --type deb \
            --dest build/jpackage \
            --linux-package-name secureprops

      - name: Build Windows installer
        if: runner.os == 'Windows'
        run: >
          jpackage --input build/libs --name SecureProps
          --main-jar secureprops.jar
          --main-class com.cleodual.mulesoft.Main
          --type exe
          --dest build/jpackage

      - name: Build macOS installer
        if: runner.os == 'macOS'
        run: |
          jpackage \
            --input build/libs \
            --name SecureProps \
            --main-jar secureprops.jar \
            --main-class com.cleodual.mulesoft.Main \
            --type dmg \
            --dest build/jpackage

      # -----------------------
      # RENAME FILES (IMPORTANT)
      # -----------------------

      - name: Rename outputs
        run: |
          VERSION=${GITHUB_REF_NAME}

          if [[ "$RUNNER_OS" == "Linux" ]]; then
            mv build/jpackage/*.deb SecureProps-$VERSION.deb
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            mv build/jpackage/*.exe SecureProps-$VERSION.exe
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            mv build/jpackage/*.dmg SecureProps-$VERSION.dmg
          fi
        shell: bash

      # -----------------------
      # UPLOAD TO RELEASE
      # -----------------------

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SecureProps-*.exe
            SecureProps-*.dmg
            SecureProps-*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

