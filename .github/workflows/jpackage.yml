name: Build Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Make Gradle executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      # ✅ Just call Gradle task (no manual jpackage!)
      - name: Build installer
        run: ./gradlew clean jpackage
        shell: bash

      # Windows fix (PowerShell)
      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        run: gradlew.bat clean jpackage

      # ✅ Upload packaged installer
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-installer
          path: build/jpackage/*