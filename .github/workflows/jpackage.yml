name: Build Installers (jpackage)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build Shadow JAR
        run: ./gradlew shadowJar

      # ✅ FIX: Linux requires packaging tools or jpackage will fail/hang
      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg-dev rpm

      # ---------------------------
      # LINUX BUILD
      # ---------------------------
      - name: Build Installer (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          jpackage \
            --input build/libs \
            --name SecureProps \
            --main-jar secureprops.jar \
            --main-class com.cleodual.mulesoft.Main \
            --type deb \
            --dest build/jpackage \
            --linux-shortcut \
            --linux-package-name secureprops

      # ---------------------------
      # WINDOWS BUILD (FIXED)
      # ---------------------------
      - name: Build Installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          jpackage --input build/libs --name SecureProps
          --main-jar secureprops.jar
          --main-class com.cleodual.mulesoft.Main
          --type exe
          --dest build/jpackage

      # ---------------------------
      # MACOS BUILD
      # ---------------------------
      - name: Build Installer (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          jpackage \
            --input build/libs \
            --name SecureProps \
            --main-jar secureprops.jar \
            --main-class com.cleodual.mulesoft.Main \
            --type dmg \
            --dest build/jpackage

      # ---------------------------
      # UPLOAD ARTIFACTS
      # ---------------------------
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ runner.os }}
          path: build/jpackage/**