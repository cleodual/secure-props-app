name: Build & Release Installers

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build Shadow JAR
        run: ./gradlew shadowJar

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg-dev rpm

      - name: Install WiX Toolset (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $wixUrl = "https://github.com/wixtoolset/wix3/releases/download/wix3111rtm/wix311.exe"
          $wixPath = "$env:TEMP\wix311.exe"
          Write-Host "Downloading WiX toolset..."
          (New-Object System.Net.ServicePointManager).SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri $wixUrl -OutFile $wixPath
          Write-Host "Installing WiX toolset..."
          & $wixPath /install /quiet /norestart
          Write-Host "WiX toolset installed successfully"

      - name: Build Installers
        shell: bash
        run: |
          mkdir -p dist
          
          # Determine package type based on OS
          if [ "$RUNNER_OS" = "Linux" ]; then 
            TYPE="deb"
          elif [ "$RUNNER_OS" = "Windows" ]; then 
            TYPE="msi"
          else 
            TYPE="dmg"
          fi

          echo "Building $TYPE installer..."
          
          # Build jpackage command with platform-specific options
          if [ "$TYPE" = "msi" ]; then
            jpackage \
              --input build/libs \
              --name SecureProps \
              --app-version "${GITHUB_REF_NAME#v}" \
              --main-jar secureprops.jar \
              --main-class com.cleodual.mulesoft.Main \
              --type "$TYPE" \
              --dest dist \
              --win-menu \
              --win-menu-group "SecureProps" \
              --win-shortcut \
              --win-dir-chooser || { echo "jpackage failed"; ls -la dist/; exit 1; }
          else
            jpackage \
              --input build/libs \
              --name SecureProps \
              --app-version "${GITHUB_REF_NAME#v}" \
              --main-jar secureprops.jar \
              --main-class com.cleodual.mulesoft.Main \
              --type "$TYPE" \
              --dest dist || { echo "jpackage failed"; ls -la dist/; exit 1; }
          fi

          echo "Contents of dist directory:"
          ls -lah dist/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers
          path: dist/
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          name: installers
          path: release-files

      - name: List downloaded files
        shell: bash
        run: |
          echo "=== Contents of release-files directory ==="
          find release-files -type f -exec ls -lh {} \;
          echo ""
          echo "=== Files to upload ==="
          find release-files -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: release-files/*
          generate_release_notes: true
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

