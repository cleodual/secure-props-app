name: Build Installers (jpackage)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build Shadow JAR
        run: ./gradlew shadowJar

      - name: Create jpackage image
        run: |
          mkdir -p build/jpackage

          jpackage \
            --input build/libs \
            --name SecureProps \
            --main-jar secureprops.jar \
            --main-class com.cleodual.mulesoft.Main \
            --type app-image \
            --dest build/jpackage \
            --java-options "--enable-preview"

      - name: Build Installer (Linux)
        if: runner.os == 'Linux'
        run: |
          jpackage \
            --input build/libs \
            --name SecureProps \
            --main-jar secureprops.jar \
            --main-class com.cleodual.mulesoft.Main \
            --type deb \
            --dest build/jpackage

      - name: Build Installer (Windows)
        if: runner.os == 'Windows'
        run: |
          jpackage ^
            --input build/libs ^
            --name SecureProps ^
            --main-jar secureprops.jar ^
            --main-class com.cleodual.mulesoft.Main ^
            --type exe ^
            --dest build/jpackage

      - name: Build Installer (macOS)
        if: runner.os == 'macOS'
        run: |
          jpackage \
            --input build/libs \
            --name SecureProps \
            --main-jar secureprops.jar \
            --main-class com.cleodual.mulesoft.Main \
            --type dmg \
            --dest build/jpackage

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ runner.os }}
          path: build/jpackage/**


