name: Build & Release Installers

on:
  push:
    tags:
      - "v*"

# ✅ REQUIRED: fixes "Resource not accessible by integration"
permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      # -----------------------
      # CHECKOUT
      # -----------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------
      # JAVA SETUP
      # -----------------------
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      # -----------------------
      # GRADLE SETUP
      # -----------------------
      - name: Make Gradle executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build Shadow JAR
        run: ./gradlew shadowJar

      # -----------------------
      # LINUX FIX (CRITICAL)
      # -----------------------
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg-dev rpm

      # -----------------------
      # BUILD INSTALLERS
      # -----------------------

      - name: Build Linux installer
        if: runner.os == 'Linux'
        shell: bash
        run: |
          jpackage \
            --input build/libs \
            --name SecureProps \
            --main-jar secureprops.jar \
            --main-class com.cleodual.mulesoft.Main \
            --type deb \
            --dest build/jpackage \
            --linux-package-name secureprops

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          jpackage --input build/libs --name SecureProps
          --main-jar secureprops.jar
          --main-class com.cleodual.mulesoft.Main
          --type exe
          --dest build/jpackage

      - name: Build macOS installer
        if: runner.os == 'macOS'
        shell: bash
        run: |
          jpackage \
            --input build/libs \
            --name SecureProps \
            --main-jar secureprops.jar \
            --main-class com.cleodual.mulesoft.Main \
            --type dmg \
            --dest build/jpackage

      # -----------------------
      # RENAME OUTPUTS (FIXES "file not found")
      # -----------------------
      - name: Rename installers
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME}

          echo "Detected OS: $RUNNER_OS"
          echo "Looking for installers..."
          ls -la build/jpackage/ || echo "jpackage directory not found"

          if [ "$RUNNER_OS" = "Linux" ]; then
            FILE=$(find build/jpackage -name "*.deb" | head -n 1)
            if [ -n "$FILE" ]; then
              mv "$FILE" "SecureProps-$VERSION.deb"
              echo "Created: SecureProps-$VERSION.deb"
            fi

          elif [ "$RUNNER_OS" = "Windows" ]; then
            FILE=$(find build/jpackage -name "*.exe" | head -n 1)
            if [ -n "$FILE" ]; then
              mv "$FILE" "SecureProps-$VERSION.exe"
              echo "Created: SecureProps-$VERSION.exe"
            fi

          elif [ "$RUNNER_OS" = "macOS" ]; then
            FILE=$(find build/jpackage -name "*.dmg" | head -n 1)
            if [ -n "$FILE" ]; then
              mv "$FILE" "SecureProps-$VERSION.dmg"
              echo "Created: SecureProps-$VERSION.dmg"
            fi
          fi
          
          echo "Files in current directory:"
          ls -la SecureProps-* 2>/dev/null || echo "No SecureProps files found"

      # -----------------------
      # DEBUG (optional but useful)
      # -----------------------
      - name: List files
        shell: bash
        run: |
          echo "=== Root directory ==="
          ls -la
          echo ""
          echo "=== Build directory ==="
          ls -la build/ || echo "build/ not found"
          echo ""
          echo "=== Build/jpackage directory ==="
          ls -la build/jpackage/ || echo "build/jpackage/ not found"

      # -----------------------
      # UPLOAD TO GITHUB RELEASE
      # -----------------------
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SecureProps-*.exe
            SecureProps-*.dmg
            SecureProps-*.deb
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}