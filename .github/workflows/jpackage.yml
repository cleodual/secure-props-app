name: Build & Release Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Make Gradle executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      # ✅ Linux + macOS
      - name: Build installer (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./gradlew clean jpackage -Pversion=$VERSION

      # ✅ Windows (FIXED)
      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat clean jpackage -Pversion=$env:VERSION

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-installer
          path: build/jpackage/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.msi
            **/*.exe
            **/*.dmg
            **/*.pkg
            **/*.deb
            **/*.rpm
