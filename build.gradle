plugins {
    id 'java'
    id 'application'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
}

group = 'com.cleodual.mulesoft'
version = '1.0-SNAPSHOT'



application {
    mainClass = 'com.cleodual.mulesoft.Main'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation files('libs/secure-properties-tool.jar')
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}

tasks.register('packageApp', Exec) {
    dependsOn shadowJar

    doFirst {
        def jarName = tasks.shadowJar.archiveFileName.get()
        def installerType = (project.findProperty('installerType') ?: (org.gradle.internal.os.OperatingSystem.current().isWindows() ? 'msi' : 'app-image')).toString()

        def args = [
                '--input', 'build/libs',
                '--dest', 'build/jpackage',
                '--name', 'SecurePropsApp',
                '--main-jar', jarName,
                '--main-class', 'com.cleodual.mulesoft.Main',
                '--type', installerType
        ]

        if (installerType == 'msi') {
            args.addAll([
                    '--win-dir-chooser',
                    '--win-shortcut-prompt',
                    '--win-shortcut',
                    '--win-menu'
            ])
        }

        commandLine(['jpackage'] + args)
    }
}